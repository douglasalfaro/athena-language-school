<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預約已送出 | 雅喜娜美語補習班</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6B2B;
    --blue: #3B5BDB;
    --dark: #1A1A2E;
    --gray: #6B7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: 'Noto Sans TC', 'Nunito', sans-serif;
    color: var(--dark);
    background: linear-gradient(135deg, var(--orange), #FF9A5C 45%, #FFD43B);
  }
  main {
    width: min(560px, 100%);
    background: white;
    border-radius: 24px;
    padding: 44px 34px;
    text-align: center;
    box-shadow: 0 22px 60px rgba(0,0,0,0.18);
  }
  .mark {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    margin: 0 auto 18px;
    color: white;
    background: var(--blue);
    font-size: 2.1rem;
    font-weight: 900;
  }
  h1 {
    font-size: clamp(1.8rem, 6vw, 2.5rem);
    line-height: 1.2;
    margin-bottom: 12px;
  }
  p {
    color: var(--gray);
    font-size: 1rem;
    line-height: 1.8;
    margin-bottom: 26px;
  }
  a {
    display: inline-block;
    color: white;
    background: var(--orange);
    border-radius: 999px;
    padding: 13px 24px;
    text-decoration: none;
    font-weight: 900;
  }
</style>
</head>
<body>
<main>
  <div class="mark">✓</div>
  <h1>預約已成功送出！</h1>
  <p>感謝您的預約，雅喜娜美語補習班將盡快與您聯繫。<br>Thank you. We will contact you soon.</p>
  <a href="/">回到首頁</a>
</main>
</body>
</html>
