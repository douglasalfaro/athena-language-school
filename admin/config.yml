backend:
  name: git-gateway
  branch: master

media_folder: "assets"
public_folder: "assets"

collections:
  - name: "hero"
    label: "首頁主視覺"
    label_singular: "主視覺"
    description: "編輯首頁的標語、副標題、特色亮點與照片"
    folder: "content"
    create: false
    delete: false
    format: "json"
    slug: "hero"
    files:
      - label: "主視覺設定"
        name: "hero"
        file: "content/hero.json"
        fields:
          - { label: "標籤", name: "tag", widget: "string" }
          - { label: "標題 (支援 HTML)", name: "title", widget: "text" }
          - { label: "副標題 (支援 HTML)", name: "subtitle", widget: "text" }
          - label: "特色亮點"
            name: "highlights"
            widget: "list"
            fields:
              - { label: "圖示", name: "emoji", widget: "string" }
              - { label: "標籤", name: "label", widget: "string" }
          - label: "照片"
            name: "photos"
            widget: "list"
            fields:
              - { label: "圖片", name: "src", widget: "image", choose_url: true }
              - { label: "替代文字", name: "alt", widget: "string" }
              - { label: "徽章", name: "badge", widget: "string" }
              - { label: "說明", name: "caption", widget: "string" }

  - name: "features"
    label: "特色介紹"
    label_singular: "特色"
    description: "編輯「為什麼選擇我們」區塊的內容"
    folder: "content"
    create: false
    delete: false
    format: "json"
    slug: "features"
    files:
      - label: "特色設定"
        name: "features"
        file: "content/features.json"
        fields:
          - { label: "區塊標籤", name: "section_tag", widget: "string" }
          - { label: "區塊標題", name: "section_title", widget: "string" }
          - { label: "區塊說明", name: "section_desc", widget: "text" }
          - label: "特色項目"
            name: "items"
            widget: "list"
            fields:
              - { label: "圖示", name: "icon", widget: "string" }
              - { label: "標題", name: "title", widget: "string" }
              - { label: "說明", name: "desc", widget: "text" }

  - name: "courses"
    label: "課程介紹"
    label_singular: "課程"
    description: "編輯課程內容、年齡、說明與標籤"
    folder: "content"
    create: false
    delete: false
    format: "json"
    slug: "courses"
    files:
      - label: "課程設定"
        name: "courses"
        file: "content/courses.json"
        fields:
          - { label: "區塊標籤", name: "section_tag", widget: "string" }
          - { label: "區塊標題", name: "section_title", widget: "string" }
          - { label: "區塊說明", name: "section_desc", widget: "text" }
          - label: "課程項目"
            name: "items"
            widget: "list"
            fields:
              - { label: "圖示", name: "emoji", widget: "string" }
              - { label: "年齡", name: "age", widget: "string" }
              - { label: "課程名稱", name: "title", widget: "string" }
              - { label: "說明", name: "desc", widget: "text" }
              - { label: "標籤", name: "tags", widget: "list", field: { label: "標籤", name: "tag", widget: "string" } }

  - name: "teachers"
    label: "師資陣容"
    label_singular: "老師"
    description: "編輯老師的照片、姓名、職稱與介紹"
    folder: "content"
    create: false
    delete: false
    format: "json"
    slug: "teachers"
    files:
      - label: "師資設定"
        name: "teachers"
        file: "content/teachers.json"
        fields:
          - { label: "區塊標籤", name: "section_tag", widget: "string" }
          - { label: "區塊標題", name: "section_title", widget: "string" }
          - { label: "區塊說明", name: "section_desc", widget: "text" }
          - label: "老師"
            name: "items"
            widget: "list"
            fields:
              - { label: "照片", name: "photo", widget: "image", choose_url: true }
              - { label: "姓名", name: "name", widget: "string" }
              - { label: "職稱", name: "title", widget: "string" }
              - { label: "介紹", name: "desc", widget: "text" }

  - name: "contact"
    label: "聯絡資訊"
    label_singular: "聯絡資訊"
    description: "編輯地址、電話、營業時間、地圖與 LINE 資訊"
    folder: "content"
    create: false
    delete: false
    format: "json"
    slug: "contact"
    files:
      - label: "聯絡設定"
        name: "contact"
        file: "content/contact.json"
        fields:
          - { label: "地址", name: "address", widget: "string" }
          - { label: "地址連結", name: "address_link", widget: "string" }
          - { label: "電話", name: "phone", widget: "string" }
          - { label: "電話連結", name: "phone_link", widget: "string" }
          - { label: "營業時間 (支援 HTML)", name: "hours", widget: "text" }
          - { label: "學費說明", name: "tuition", widget: "string" }
          - { label: "地圖嵌入網址", name: "map_embed_url", widget: "string" }
          - { label: "LINE QR Code", name: "line_qr", widget: "image", choose_url: true }
          - { label: "LINE ID", name: "line_id", widget: "string" }
          - { label: "LINE 連結", name: "line_link", widget: "string" }
          - { label: "Facebook 連結", name: "facebook_link", widget: "string" }
          - label: "統計數字"
            name: "stats"
            widget: "list"
            fields:
              - { label: "數字", name: "num", widget: "string" }
              - { label: "標籤", name: "label", widget: "string" }
