<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Athena 網站管理</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <style>
    /* Athena School branding for Decap CMS */
    :root {
      --athena-orange: #FF6B2B;
      --athena-blue: #3B5BDB;
      --athena-yellow: #FFD43B;
    }
    img[src*="logo"] {
      display: none;
    }
    .nc-appHeader-logo {
      display: flex !important;
      align-items: center !important;
      gap: 10px !important;
    }
    .nc-appHeader-logo::before {
      content: '';
      display: inline-block;
      width: 32px;
      height: 32px;
      background: var(--athena-orange);
      border-radius: 50%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3ClinearGradient id='ng' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%23FF6B2B'/%3E%3Cstop offset='100%25' stop-color='%23FF9A5C'/%3E%3C/linearGradient%3E%3ClinearGradient id='nb' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%233B5BDB'/%3E%3Cstop offset='100%25' stop-color='%232244BB'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='48' fill='url(%23ng)'/%3E%3Cg transform='translate(-8 -8) scale(1.16)'%3E%3Cellipse cx='35' cy='62' rx='14' ry='8' fill='url(%23nb)' transform='rotate(-30 35 62)'/%3E%3Cellipse cx='65' cy='62' rx='14' ry='8' fill='url(%23nb)' transform='rotate(30 65 62)'/%3E%3Cellipse cx='50' cy='65' rx='18' ry='22' fill='url(%23nb)'/%3E%3Cellipse cx='50' cy='71' rx='11' ry='14' fill='white' opacity='0.18'/%3E%3Cpolygon points='42,32 38,22 46,28' fill='url(%23nb)'/%3E%3Cpolygon points='58,32 62,22 54,28' fill='url(%23nb)'/%3E%3Cellipse cx='50' cy='42' rx='17' ry='15' fill='url(%23nb)'/%3E%3Cellipse cx='43' cy='40' rx='5' ry='5' fill='white'/%3E%3Cellipse cx='57' cy='40' rx='5' ry='5' fill='white'/%3E%3Ccircle cx='43' cy='40' r='3.5' fill='%23FFD43B'/%3E%3Ccircle cx='57' cy='40' r='3.5' fill='%23FFD43B'/%3E%3Ccircle cx='43.5' cy='40' r='2' fill='%231A1A2E'/%3E%3Ccircle cx='57.5' cy='40' r='2' fill='%231A1A2E'/%3E%3Ccircle cx='44.5' cy='39' r='0.8' fill='white'/%3E%3Ccircle cx='58.5' cy='39' r='0.8' fill='white'/%3E%3Cpolygon points='50,46 47,51 53,51' fill='%23FFD43B'/%3E%3Crect x='41' y='26' width='18' height='3' rx='1' fill='%23FFD43B'/%3E%3Cpolygon points='50,19 60,26 40,26' fill='%23FFD43B'/%3E%3C/g%3E%3C/svg%3E");
      background-size: contain;
    }
    .nc-appHeader-logo::after {
      content: 'Athena 管理後台';
      font-size: 16px;
      font-weight: 600;
      color: #2c3e50;
    }

    /* Login page branding */
    .nc-loginPage-greeting::before {
      content: '雅喜娜美語補習班';
      display: block;
      font-size: 24px;
      font-weight: 700;
      color: var(--athena-orange);
      margin-bottom: 4px;
    }
    .nc-loginPage-greeting::after {
      content: 'Athena Language School — 讓孩子愛上說 English！';
      display: block;
      font-size: 14px;
      color: #666;
      margin-top: 4px;
    }
    .nc-loginPage-greeting > * {
      display: none;
    }
    .nc-loginPage-card {
      border-top: 4px solid var(--athena-orange) !important;
    }
    .nc-loginPage-card button[type="submit"] {
      background: var(--athena-orange) !important;
      border-color: var(--athena-orange) !important;
    }
    .nc-loginPage-card button[type="submit"]:hover {
      background: #e55a1f !important;
    }
    .nc-loginPage-card a {
      color: var(--athena-blue) !important;
    }

    /* Sidebar branding */
    .nc-sidebarContainer {
      background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%) !important;
    }
    .nc-sidebarContainer a[href*="logout"] {
      color: var(--athena-orange) !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
</body>
</html>
