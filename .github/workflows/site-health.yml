name: Athena Health Check

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Check homepage
        id: homepage
        run: echo "status=$(curl -s -o /dev/null -w '%{http_code}' 'https://123athena.com/')" >> $GITHUB_OUTPUT

      - name: Check admin page
        id: admin
        run: echo "status=$(curl -s -o /dev/null -w '%{http_code}' 'https://123athena.com/admin/')" >> $GITHUB_OUTPUT

      - name: Check grammar game
        id: grammar
        run: echo "status=$(curl -s -o /dev/null -w '%{http_code}' 'https://123athena.com/grammar-game.html')" >> $GITHUB_OUTPUT

      - name: Check sitemap
        id: sitemap
        run: echo "status=$(curl -s -o /dev/null -w '%{http_code}' 'https://123athena.com/sitemap.xml')" >> $GITHUB_OUTPUT

      - name: Check robots.txt
        id: robots
        run: echo "status=$(curl -s -o /dev/null -w '%{http_code}' 'https://123athena.com/robots.txt')" >> $GITHUB_OUTPUT

      - name: Check SSL certificate expiry
        id: ssl
        run: echo "expiry=$(echo | openssl s_client -servername 123athena.com -connect 123athena.com:443 2>/dev/null | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Build HTML email
        id: html
        env:
          HP_STATUS: ${{ steps.homepage.outputs.status }}
          AD_STATUS: ${{ steps.admin.outputs.status }}
          GR_STATUS: ${{ steps.grammar.outputs.status }}
          SI_STATUS: ${{ steps.sitemap.outputs.status }}
          RO_STATUS: ${{ steps.robots.outputs.status }}
          SSL_EXPIRY: ${{ steps.ssl.outputs.expiry }}
          JOB_STATUS: ${{ job.status }}
        run: bash .github/scripts/build-email.sh

      - name: Send email via Resend
        if: always()
        run: |
          HTML=$(cat /tmp/email-json.txt)
          curl -s -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H 'Content-Type: application/json' \
            -d "{\"from\":\"Athena Health Check <health@alphacooltech.com>\",\"to\":[\"douglas@alphacooltech.com\"],\"subject\":\"Athena School - Weekly Health Check (${{ job.status }})\",\"html\":$HTML}"
