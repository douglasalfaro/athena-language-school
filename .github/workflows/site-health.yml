name: Athena Health Check

on:
  schedule:
    - cron: '0 1 * * 1'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check homepage
        id: homepage
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://123athena.com/")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Check admin page
        id: admin
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://123athena.com/admin/")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Check grammar game
        id: grammar
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://123athena.com/grammar-game.html")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Check sitemap
        id: sitemap
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://123athena.com/sitemap.xml")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Check robots.txt
        id: robots
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://123athena.com/robots.txt")
          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Check SSL certificate expiry
        id: ssl
        run: |
          EXPIRY=$(echo | openssl s_client -servername 123athena.com -connect 123athena.com:443 2>/dev/null | openssl x509 -noout -enddate 2>/dev/null | cut -d= -f2)
          echo "expiry=$EXPIRY" >> $GITHUB_OUTPUT

      - name: Build HTML email
        id: html
        run: |
          STATUS_ICON=${{ steps.homepage.outputs.status }}
          ADMIN_ICON=${{ steps.admin.outputs.status }}
          GRAMMAR_ICON=${{ steps.grammar.outputs.status }}
          SITEMAP_ICON=${{ steps.sitemap.outputs.status }}
          ROBOTS_ICON=${{ steps.robots.outputs.status }}
          SSL_EXPIRY="${{ steps.ssl.outputs.expiry }}"

          FAILURES=0
          for s in "$STATUS_ICON" "$ADMIN_ICON" "$GRAMMAR_ICON" "$SITEMAP_ICON" "$ROBOTS_ICON"; do
            if [ "$s" != "200" ]; then FAILURES=$((FAILURES + 1)); fi
          done

          if [ "$FAILURES" -gt 0 ]; then
            OVERALL="🔴 $FAILURES page(s) need attention"
            OVERALL_COLOR="#dc2626"
          else
            OVERALL="✅ All pages healthy"
            OVERALL_COLOR="#16a34a"
          fi

          BADGE_OK='<span style="display:inline-block;background:#16a34a;color:#fff;font-size:12px;font-weight:700;padding:2px 10px;border-radius:10px">OK</span>'
          BADGE_FAIL='<span style="display:inline-block;background:#dc2626;color:#fff;font-size:12px;font-weight:700;padding:2px 10px;border-radius:10px">FAIL</span>'

          [ "$STATUS_ICON" = "200" ] && HP="$BADGE_OK" || HP="$BADGE_FAIL"
          [ "$ADMIN_ICON" = "200" ] && AD="$BADGE_OK" || AD="$BADGE_FAIL"
          [ "$GRAMMAR_ICON" = "200" ] && GR="$BADGE_OK" || GR="$BADGE_FAIL"
          [ "$SITEMAP_ICON" = "200" ] && SI="$BADGE_OK" || SI="$BADGE_FAIL"
          [ "$ROBOTS_ICON" = "200" ] && RO="$BADGE_OK" || RO="$BADGE_FAIL"

          cat > email.html << 'HTMLEOF'
<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f5;padding:24px 0">
<tr><td align="center">
<table width="560" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)">
  <tr><td style="background:#1e3a5f;padding:28px 32px;text-align:center">
    <h1 style="margin:0;color:#fff;font-size:22px;font-weight:700">🏫 Athena Language School</h1>
    <p style="margin:6px 0 0;color:#94a3b8;font-size:13px">Weekly Health Check</p>
  </td></tr>
  <tr><td style="padding:24px 32px 0">
    <p style="margin:0 0 16px;color:#64748b;font-size:13px">HTMLEOF
          echo "      $(date -u '+%A, %B %d, %Y at %H:%M UTC')" >> email.html
          cat >> email.html << 'HTMLEOF'
    </p>
    <div style="background:HTMLEOF
          echo -n "$OVERALL_COLOR" >> email.html
          cat >> email.html << 'HTMLEOF'
;color:#fff;padding:12px 20px;border-radius:8px;font-size:15px;font-weight:600;text-align:center;margin-bottom:24px">
      HTMLEOF
          echo -n "$OVERALL" >> email.html
          cat >> email.html << 'HTMLEOF'
    </div>
  </td></tr>
  <tr><td style="padding:0 32px">
    <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse">
      <tr style="background:#f8fafc">
        <td style="padding:10px 16px;border-bottom:1px solid #e2e8f0;font-size:13px;font-weight:600;color:#475569">Page</td>
        <td style="padding:10px 16px;border-bottom:1px solid #e2e8f0;font-size:13px;font-weight:600;color:#475569;text-align:center">Status</td>
      </tr>
      <tr>
        <td style="padding:12px 16px;border-bottom:1px solid #f1f5f9;font-size:14px;color:#334155">🏠 Homepage</td>
        <td style="padding:12px 16px;border-bottom:1px solid #f1f5f9;text-align:center">HTMLEOF
          echo -n "$HP" >> email.html
          cat >> email.html << 'HTMLEOF'
</td>
      </tr>
      <tr style="background:#fafafa">
        <td style="padding:12px 16px;border-bottom:1px solid #f1f5f9;font-size:14px;color:#334155">🔐 Admin</td>
        <td style="padding:12px 16px;border-bottom:1px solid #f1f5f9;text-align:center">HTMLEOF
          echo -n "$AD" >> email.html
          cat >> email.html << 'HTMLEOF'
</td>
      </tr>
      <tr>
        <td style="padding:12px 16px;border-bottom:1px solid #f1f5f9;font-size:14px;color:#334155">🎮 Grammar Game</td>
        <td style="padding:12px 16px;border-bottom:1px solid #f1f5f9;text-align:center">HTMLEOF
          echo -n "$GR" >> email.html
          cat >> email.html << 'HTMLEOF'
</td>
      </tr>
      <tr style="background:#fafafa">
        <td style="padding:12px 16px;border-bottom:1px solid #f1f5f9;font-size:14px;color:#334155">🗺️ Sitemap</td>
        <td style="padding:12px 16px;border-bottom:1px solid #f1f5f9;text-align:center">HTMLEOF
          echo -n "$SI" >> email.html
          cat >> email.html << 'HTMLEOF'
</td>
      </tr>
      <tr>
        <td style="padding:12px 16px;border-bottom:1px solid #f1f5f9;font-size:14px;color:#334155">🤖 robots.txt</td>
        <td style="padding:12px 16px;border-bottom:1px solid #f1f5f9;text-align:center">HTMLEOF
          echo -n "$RO" >> email.html
          cat >> email.html << 'HTMLEOF'
</td>
      </tr>
    </table>
  </td></tr>
  <tr><td style="padding:20px 32px 0">
    <table width="100%" cellpadding="0" cellspacing="0" style="background:#fefce8;border:1px solid #fde68a;border-radius:8px">
      <tr><td style="padding:12px 16px;font-size:13px;color:#92400e">
        <strong>🔒 SSL Certificate</strong> — Expires: HTMLEOF
          echo -n "$SSL_EXPIRY" >> email.html
          cat >> email.html << 'HTMLEOF'
      </td></tr>
    </table>
  </td></tr>
  <tr><td style="padding:24px 32px 28px;text-align:center;border-top:1px solid #e2e8f0;margin-top:24px">
    <p style="margin:0;font-size:12px;color:#94a3b8">Athena Language School · 123athena.com</p>
    <p style="margin:4px 0 0;font-size:11px;color:#cbd5e1">This is an automated health check sent every Monday 9:00 AM Taiwan time.</p>
  </td></tr>
</table>
</td></tr></table>
</body>
</html>
HTMLEOF

      - name: Send email via Resend
        if: always()
        run: |
          HTML=$(cat email.html | python3 -c "import sys, json; print(json.dumps(sys.stdin.read()))")
          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${{ secrets.RESEND_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "from": "Athena Health Check <health@alphacooltech.com>",
              "to": ["douglas@alphacooltech.com"],
              "subject": "Athena School - Weekly Health Check (${{ job.status }})",
              "html": '"$HTML"'
            }'
